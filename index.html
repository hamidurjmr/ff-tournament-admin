<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>FF TOURNEY • ADMIN PANEL</title>
  <!-- Font & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #1d1b2a, #0a0c15);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
    }

    /* glassmorphism admin cards */
    .glass-card {
      background: rgba(18, 22, 40, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(0, 255, 200, 0.25);
      border-radius: 32px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 255, 255, 0.2);
      padding: 24px;
      transition: transform 0.2s ease, box-shadow 0.3s;
    }

    .glass-card:hover {
      box-shadow: 0 30px 60px cyan, 0 0 40px #00b7ff80;
      transform: translateY(-6px);
    }

    /* glowing button */
    .glow-btn {
      background: linear-gradient(135deg, #00e0ff, #0066ff);
      border: none;
      border-radius: 40px;
      padding: 12px 28px;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 0 20px #00d0ff, 0 5px 12px #00000080;
      transition: 0.15s;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .glow-btn:hover {
      background: linear-gradient(135deg, #55eeff, #1e40ff);
      box-shadow: 0 0 35px cyan, 0 8px 20px black;
      transform: scale(1.02);
    }

    .glow-btn.small {
      padding: 8px 18px;
      font-size: 14px;
    }

    .neon {
      color: #fff;
      text-shadow: 0 0 6px cyan, 0 0 20px deepskyblue;
    }

    .app-container {
      width: 100%;
      max-width: 1400px;
    }

    /* auth section (admin login) */
    .auth-container {
      max-width: 460px;
      margin: 40px auto;
    }

    .hidden {
      display: none !important;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 6px solid rgba(0,255,255,0.2);
      border-top: 6px solid cyan;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 30px auto;
    }

    @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }

    input, textarea, select {
      width: 100%;
      background: rgba(10, 18, 30, 0.9);
      border: 1px solid #00a6ff70;
      border-radius: 40px;
      padding: 14px 22px;
      color: white;
      font-size: 16px;
      margin: 10px 0;
      outline: none;
    }

    input:focus, select:focus {
      border-color: cyan;
      box-shadow: 0 0 20px cyan;
    }

    /* dashboard layout */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: #0f1422cc;
      border-radius: 30px;
      padding: 20px;
      border-left: 6px solid cyan;
      backdrop-filter: blur(8px);
    }

    .section-title {
      font-size: 24px;
      margin: 30px 0 20px;
      border-bottom: 2px solid cyan;
      display: inline-block;
      padding-bottom: 6px;
    }

    /* admin grid */
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
      margin-bottom: 30px;
    }

    .request-item {
      background: rgba(0, 255, 255, 0.05);
      border-radius: 30px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #00ccff40;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .request-item span {
      font-size: 15px;
    }

    .flex-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .match-mini-card {
      background: #0b1022;
      border-radius: 28px;
      padding: 16px;
      margin-bottom: 16px;
      border-left: 5px solid gold;
    }

    @media (max-width: 700px) {
      .glass-card { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="app-container" id="appContainer">
    <!-- loader -->
    <div id="globalLoader" class="loading-spinner" style="margin: 100px auto;"></div>

    <!-- ADMIN LOGIN SECTION -->
    <div id="authSection" class="auth-container glass-card hidden">
      <h1 class="neon" style="text-align:center;"><i class="fas fa-shield-alt"></i> ADMIN PORTAL</h1>
      <p style="color:#aaa; text-align:center; margin-bottom:20px;">authorized personnel only</p>
      <input type="email" id="adminEmail" placeholder="Admin Email" value="admin@ff.com">
      <input type="password" id="adminPassword" placeholder="Password" value="admin123">
      <button class="glow-btn" style="width:100%;" id="adminLoginBtn"><i class="fas fa-lock-open"></i> LOGIN</button>
      <p id="adminAuthMessage" style="color: #ff9966; margin-top:15px; text-align:center;"></p>
    </div>

    <!-- MAIN ADMIN DASHBOARD (visible after auth) -->
    <div id="dashboardSection" class="hidden">
      <!-- header -->
      <div class="glass-card dashboard-header">
        <h1 class="neon"><i class="fas fa-crown"></i> ADMIN · FF TOURNEY</h1>
        <button class="glow-btn small" id="adminLogoutBtn"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
      </div>

      <!-- quick stats (dynamic) -->
      <div class="stats-row">
        <div class="stat-card"><i class="fas fa-clock"></i> Pending deposits: <span id="statDeposits">0</span></div>
        <div class="stat-card"><i class="fas fa-hand-holding-heart"></i> Pending withdrawals: <span id="statWithdraws">0</span></div>
        <div class="stat-card"><i class="fas fa-gamepad"></i> Active matches: <span id="statMatches">0</span></div>
        <div class="stat-card"><i class="fas fa-users"></i> Total users: <span id="statUsers">-</span></div>
      </div>

      <!-- ADMIN PANELS grid (all features) -->
      <div class="admin-grid">
        <!-- DEPOSIT REQUESTS -->
        <div class="glass-card">
          <h3><i class="fas fa-arrow-down"></i> DEPOSIT REQUESTS</h3>
          <div id="depositsList" style="max-height:300px; overflow-y:auto;">loading...</div>
        </div>

        <!-- WITHDRAWAL REQUESTS -->
        <div class="glass-card">
          <h3><i class="fas fa-arrow-up"></i> WITHDRAWALS</h3>
          <div id="withdrawsList" style="max-height:300px; overflow-y:auto;">loading...</div>
        </div>

        <!-- MATCH MANAGEMENT (create + delete) -->
        <div class="glass-card">
          <h3><i class="fas fa-swords"></i> MATCH MANAGER</h3>
          <select id="matchTypeSelect"><option value="1v1">1v1</option><option value="2v2">2v2</option></select>
          <input type="number" id="entryFeeInput" placeholder="Entry fee (₹)" value="20">
          <input type="number" id="prizeInput" placeholder="Prize (₹)" value="18">
          <button class="glow-btn small" id="createMatchBtn" style="width:100%;">➕ CREATE MATCH</button>
          <hr style="border-color:cyan; margin:20px 0;">
          <div id="existingMatchesList" style="max-height:200px; overflow:auto;"></div>
        </div>

        <!-- ROOM MANAGEMENT (add room id/pwd + start match) -->
        <div class="glass-card">
          <h3><i class="fas fa-door-open"></i> ROOM & START</h3>
          <select id="matchSelectRoom" style="margin-bottom:5px;"><option>-- select match --</option></select>
          <input type="text" id="roomIdInput" placeholder="Room ID">
          <input type="text" id="roomPwdInput" placeholder="Room Password">
          <button class="glow-btn small" id="saveRoomBtn" style="width:100%;">💾 SAVE ROOM DETAILS</button>
          <button class="glow-btn small" id="startMatchBtn" style="margin-top:12px; background:linear-gradient(145deg,#f0f, #a0f);">▶️ START MATCH (set live)</button>
        </div>

        <!-- RESULT SYSTEM & REWARDS CONTROL -->
        <div class="glass-card">
          <h3><i class="fas fa-trophy"></i> RESULT & REWARDS</h3>
          <select id="matchSelectResult"><option>-- select match --</option></select>
          <select id="winnerSelect" style="margin:8px 0;"><option>-- winner --</option></select>
          <button class="glow-btn small" id="declareWinnerBtn">🏆 DECLARE WINNER</button>
          <hr style="border-color:cyan; margin:20px 0;">
          <h4>Rewards config</h4>
          <input type="number" id="reward10Matches" placeholder="Bonus for 10 matches" value="20">
          <input type="number" id="reward20Matches" placeholder="Bonus for 20 matches" value="30">
          <button class="glow-btn small" id="saveRewardsBtn">💾 UPDATE REWARDS</button>
        </div>

        <!-- SETTINGS CONTROL (fees, limits) -->
        <div class="glass-card">
          <h3><i class="fas fa-gear"></i> GLOBAL SETTINGS</h3>
          <input type="number" id="setEntry1v1" placeholder="Entry 1v1 (₹)">
          <input type="number" id="setPrize1v1" placeholder="Prize 1v1 (₹)">
          <input type="number" id="setEntry2v2" placeholder="Entry 2v2 (₹)">
          <input type="number" id="setPrize2v2" placeholder="Prize 2v2 (₹)">
          <input type="number" id="setMinDeposit" placeholder="Min deposit">
          <input type="number" id="setMaxDeposit" placeholder="Max deposit">
          <button class="glow-btn small" id="saveSettingsBtn">💾 SAVE SETTINGS</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <script>
    (function() {
      const firebaseConfig = {
        apiKey: "AIzaSyAZcAJNzY8nFZMD7ILuOArGmnjBeRRMgbo",
        authDomain: "ff-tournament-81d64.firebaseapp.com",
        projectId: "ff-tournament-81d64",
        storageBucket: "ff-tournament-81d64.firebasestorage.app",
        messagingSenderId: "171831529957",
        appId: "1:171831529957:web:833981b11c3383a9f49f0c"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      // DOM
      const loader = document.getElementById('globalLoader');
      const authSection = document.getElementById('authSection');
      const dashboard = document.getElementById('dashboardSection');
      const adminEmail = document.getElementById('adminEmail');
      const adminPass = document.getElementById('adminPassword');
      const adminAuthMsg = document.getElementById('adminAuthMessage');
      const adminLoginBtn = document.getElementById('adminLoginBtn');
      const adminLogoutBtn = document.getElementById('adminLogoutBtn');

      // Stats spans
      const statDeposits = document.getElementById('statDeposits');
      const statWithdraws = document.getElementById('statWithdraws');
      const statMatches = document.getElementById('statMatches');
      const statUsers = document.getElementById('statUsers');

      // Helpers
      function showLoader(show) { loader.classList.toggle('hidden', !show); }
      function showAuth(show) { authSection.classList.toggle('hidden', !show); }
      function showDashboard(show) { dashboard.classList.toggle('hidden', !show); }

      // Admin auth (simple email check, you may replace with role later)
      adminLoginBtn.addEventListener('click', async () => {
        const email = adminEmail.value.trim();
        const pass = adminPass.value;
        if (!email || !pass) return adminAuthMsg.innerText = 'Enter credentials';
        try {
          showLoader(true);
          await auth.signInWithEmailAndPassword(email, pass);
        } catch (err) {
          adminAuthMsg.innerText = err.message;
          showLoader(false);
        }
      });

      adminLogoutBtn.addEventListener('click', () => auth.signOut());

      // Load all admin data
      async function refreshAdminDashboard() {
        if (!auth.currentUser) return;
        // stats counts
        const depSnap = await db.collection('deposit_requests').where('status', '==', 'pending').get();
        statDeposits.innerText = depSnap.size;
        const witSnap = await db.collection('withdraw_requests').where('status', '==', 'pending').get();
        statWithdraws.innerText = witSnap.size;
        const matchSnap = await db.collection('matches').where('status', 'in', ['waiting','live']).get();
        statMatches.innerText = matchSnap.size;
        const usersSnap = await db.collection('users').get();
        statUsers.innerText = usersSnap.size;

        // load deposit requests list
        renderDeposits();
        renderWithdraws();
        renderMatchControls();
        loadSettingsToForm();
        loadRewardsToForm();
      }

      // DEPOSITS
      async function renderDeposits() {
        const snap = await db.collection('deposit_requests').where('status', '==', 'pending').get();
        let html = '';
        snap.forEach(doc => {
          const d = doc.data();
          html += `<div class="request-item">
            <span>${d.amount}₹ | ${d.refId}<br><small>${d.userId?.substring(0,6)}</small></span>
            <div><button class="glow-btn small approveDeposit" data-id="${doc.id}" data-uid="${d.userId}" data-amount="${d.amount}">✔️ Approve</button>
            <button class="glow-btn small rejectDeposit" data-id="${doc.id}" style="background:#a00;">✖️ Reject</button></div>
          </div>`;
        });
        document.getElementById('depositsList').innerHTML = html || 'No pending deposits';
        document.querySelectorAll('.approveDeposit').forEach(b => b.addEventListener('click', approveDeposit));
        document.querySelectorAll('.rejectDeposit').forEach(b => b.addEventListener('click', rejectDeposit));
      }

      async function approveDeposit(e) {
        const id = e.target.dataset.id;
        const uid = e.target.dataset.uid;
        const amount = parseInt(e.target.dataset.amount);
        await db.runTransaction(async (tx) => {
          const userRef = db.collection('users').doc(uid);
          const userSnap = await tx.get(userRef);
          if (!userSnap.exists) throw 'no user';
          tx.update(userRef, { wallet: firebase.firestore.FieldValue.increment(amount) });
          tx.update(db.collection('deposit_requests').doc(id), { status: 'approved' });
        });
        refreshAdminDashboard();
      }

      async function rejectDeposit(e) {
        await db.collection('deposit_requests').doc(e.target.dataset.id).update({ status: 'rejected' });
        refreshAdminDashboard();
      }

      // WITHDRAWALS
      async function renderWithdraws() {
        const snap = await db.collection('withdraw_requests').where('status', '==', 'pending').get();
        let html = '';
        snap.forEach(doc => {
          const w = doc.data();
          html += `<div class="request-item">
            <span>₹${w.amount} → ${w.upiId}<br><small>${w.userId?.substring(0,6)}</small></span>
            <div><button class="glow-btn small markPaid" data-id="${doc.id}" data-uid="${w.userId}" data-amount="${w.amount}">💵 Mark paid</button></div>
          </div>`;
        });
        document.getElementById('withdrawsList').innerHTML = html || 'None pending';
        document.querySelectorAll('.markPaid').forEach(b => b.addEventListener('click', markPaid));
      }

      async function markPaid(e) {
        const id = e.target.dataset.id;
        await db.collection('withdraw_requests').doc(id).update({ status: 'paid' });
        refreshAdminDashboard();
      }

      // MATCH MANAGEMENT
      async function renderMatchControls() {
        const matchSnap = await db.collection('matches').get();
        let options = '';
        let existingHtml = '';
        matchSnap.forEach(doc => {
          const m = doc.data();
          options += `<option value="${doc.id}">${m.type} (${m.entryFee}₹) ${m.status}</option>`;
          existingHtml += `<div class="match-mini-card">${m.type} | fee:${m.entryFee} prize:${m.prize} <button class="glow-btn small deleteMatch" data-id="${doc.id}" style="margin-left:10px;">🗑️ delete</button></div>`;
        });
        document.getElementById('matchSelectRoom').innerHTML = options;
        document.getElementById('matchSelectResult').innerHTML = options;
        document.getElementById('existingMatchesList').innerHTML = existingHtml || 'No matches';
        document.querySelectorAll('.deleteMatch').forEach(b => b.addEventListener('click', async (e) => {
          await db.collection('matches').doc(e.target.dataset.id).delete();
          refreshAdminDashboard();
        }));
      }

      document.getElementById('createMatchBtn').addEventListener('click', async () => {
        const type = document.getElementById('matchTypeSelect').value;
        const entry = parseInt(document.getElementById('entryFeeInput').value);
        const prize = parseInt(document.getElementById('prizeInput').value);
        if (!entry || !prize) return alert('invalid');
        await db.collection('matches').add({
          type, entryFee: entry, prize, status: 'waiting', players: []
        });
        refreshAdminDashboard();
      });

      // ROOM & START
      document.getElementById('saveRoomBtn').addEventListener('click', async () => {
        const matchId = document.getElementById('matchSelectRoom').value;
        const room = document.getElementById('roomIdInput').value;
        const pwd = document.getElementById('roomPwdInput').value;
        if (!matchId || matchId.startsWith('--')) return alert('select match');
        await db.collection('matches').doc(matchId).update({ roomId: room, roomPassword: pwd });
        alert('room saved');
      });

      document.getElementById('startMatchBtn').addEventListener('click', async () => {
        const matchId = document.getElementById('matchSelectRoom').value;
        if (!matchId || matchId.startsWith('--')) return alert('select match');
        await db.collection('matches').doc(matchId).update({ status: 'live' });
        refreshAdminDashboard();
      });

      // RESULT & WINNER
      document.getElementById('declareWinnerBtn').addEventListener('click', async () => {
        const matchId = document.getElementById('matchSelectResult').value;
        const winnerUid = document.getElementById('winnerSelect').value;
        if (!matchId || !winnerUid || winnerUid.startsWith('--')) return alert('select winner');
        const matchSnap = await db.collection('matches').doc(matchId).get();
        const match = matchSnap.data();
        if (!match) return;
        // credit winner prize (simplified)
        await db.collection('users').doc(winnerUid).update({ wallet: firebase.firestore.FieldValue.increment(match.prize || 0) });
        // update match status
        await db.collection('matches').doc(matchId).update({ status: 'completed', winner: winnerUid });
        // increment matchesPlayed for participants
        const players = match.players || [];
        for (let uid of players) {
          await db.collection('users').doc(uid).update({ matchesPlayed: firebase.firestore.FieldValue.increment(1) });
        }
        // reward bonus logic (simplified: check after increment)
        for (let uid of players) {
          const userRef = db.collection('users').doc(uid);
          const userSnap = await userRef.get();
          const mp = userSnap.data().matchesPlayed + 1; // after increment
          // we can fetch reward values from rewards collection, but simplified
          const rewardsSnap = await db.collection('rewards').doc('config').get();
          const rew = rewardsSnap.exists ? rewardsSnap.data() : { match10: 20, match20: 30 };
          if (mp === 10) await userRef.update({ wallet: firebase.firestore.FieldValue.increment(rew.match10) });
          if (mp === 20) await userRef.update({ wallet: firebase.firestore.FieldValue.increment(rew.match20) });
        }
        alert('winner credited & match completed');
        refreshAdminDashboard();
      });

      // populate winner dropdown based on match selection
      document.getElementById('matchSelectResult').addEventListener('change', async (e) => {
        const matchId = e.target.value;
        if (!matchId || matchId.startsWith('--')) return;
        const snap = await db.collection('matches').doc(matchId).get();
        const match = snap.data();
        const players = match.players || [];
        let opts = '<option value="">--winner--</option>';
        for (let uid of players) {
          const userSnap = await db.collection('users').doc(uid).get();
          const email = userSnap.exists ? userSnap.data().email : uid;
          opts += `<option value="${uid}">${email}</option>`;
        }
        document.getElementById('winnerSelect').innerHTML = opts;
      });

      // SETTINGS & REWARDS
      async function loadSettingsToForm() {
        const snap = await db.collection('settings').doc('config').get();
        if (!snap.exists) return;
        const s = snap.data();
        document.getElementById('setEntry1v1').value = s.entry1v1 || 20;
        document.getElementById('setPrize1v1').value = s.prize1v1 || 18;
        document.getElementById('setEntry2v2').value = s.entry2v2 || 40;
        document.getElementById('setPrize2v2').value = s.prize2v2 || 37;
        document.getElementById('setMinDeposit').value = s.minDeposit || 10;
        document.getElementById('setMaxDeposit').value = s.maxDeposit || 500;
      }

      document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
        const data = {
          entry1v1: parseInt(document.getElementById('setEntry1v1').value),
          prize1v1: parseInt(document.getElementById('setPrize1v1').value),
          entry2v2: parseInt(document.getElementById('setEntry2v2').value),
          prize2v2: parseInt(document.getElementById('setPrize2v2').value),
          minDeposit: parseInt(document.getElementById('setMinDeposit').value),
          maxDeposit: parseInt(document.getElementById('setMaxDeposit').value),
        };
        await db.collection('settings').doc('config').set(data);
        alert('settings saved');
      });

      async function loadRewardsToForm() {
        const snap = await db.collection('rewards').doc('config').get();
        if (snap.exists) {
          document.getElementById('reward10Matches').value = snap.data().match10 || 20;
          document.getElementById('reward20Matches').value = snap.data().match20 || 30;
        }
      }

      document.getElementById('saveRewardsBtn').addEventListener('click', async () => {
        await db.collection('rewards').doc('config').set({
          match10: parseInt(document.getElementById('reward10Matches').value),
          match20: parseInt(document.getElementById('reward20Matches').value)
        });
        alert('rewards updated');
      });

      // AUTH state observer
      auth.onAuthStateChanged(async (user) => {
        showLoader(false);
        if (user) {
          // optional: check if admin email (you can hardcode)
          if (!user.email.includes('admin')) {
            alert('not an admin account');
            auth.signOut();
            return;
          }
          showAuth(false);
          showDashboard(true);
          refreshAdminDashboard();
          // set listeners update
          db.collection('deposit_requests').onSnapshot(() => refreshAdminDashboard());
          db.collection('withdraw_requests').onSnapshot(() => refreshAdminDashboard());
          db.collection('matches').onSnapshot(() => refreshAdminDashboard());
        } else {
          showAuth(true);
          showDashboard(false);
        }
      });

      // initialize default settings/rewards if missing
      window.onload = async () => {
        showLoader(true);
        const setDoc = await db.collection('settings').doc('config').get();
        if (!setDoc.exists) await db.collection('settings').doc('config').set({ entry1v1:20, prize1v1:18, entry2v2:40, prize2v2:37, minDeposit:10, maxDeposit:500 });
        const rewDoc = await db.collection('rewards').doc('config').get();
        if (!rewDoc.exists) await db.collection('rewards').doc('config').set({ match10:20, match20:30 });
        showLoader(false);
      };
    })();
  </script>
</body>
</html>
